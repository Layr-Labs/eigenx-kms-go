version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/Layr-Labs/eigenx-kms-go/gen/protos
plugins:
  - local: protoc-gen-go
    out: gen/protos
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/protos
    opt: paths=source_relative,require_unimplemented_servers=false
inputs:
  - directory: protos
